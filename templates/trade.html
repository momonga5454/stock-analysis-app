<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>トレード登録</title>

    <!-- ✅ Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>

<body class="bg-light">

<!-- ========================= -->
<!--      ナビバー     -->
<!-- ========================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">株価分析アプリ</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="/tag-analysis">タグ自己分析</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/trade">トレード登録</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="/trades">トレード一覧</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/favorites">お気に入り</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/logout">ログアウト</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ✅ メイン -->
<div class="container mt-5">

    <h2 class="mb-4">トレード登録</h2>

    <div class="card shadow-sm p-4">
        <form method="post" action="/trade">

            <div class="mb-3">
                <label class="form-label">銘柄コード</label>
                <input type="text" name="stock_code" class="form-control" placeholder="7203.T" required>
            </div>

            <div class="mb-3">
                <label class="form-label">購入日</label>
                <input type="date" name="buy_date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">購入価格</label>
                <input type="number" step="0.01" name="buy_price" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">売却日</label>
                <input type="date" name="sell_date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">売却価格</label>
                <input type="number" step="0.01" name="sell_price" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">タグ</label><br>

              {% for tag in tags %}
                <div class="form-check">
                  <input class="form-check-input" type="checkbox"
                    name="tag_ids"
                    value="{{ tag.id }}">
                  <label class="form-check-label">
                    {{ tag.name }}
                  </label>
                </div>
              {% endfor %}
            </div>

            <!-- ✅ 新規タグ（複数入力） -->
            <div class="mb-3">
              <label class="form-label fw-bold">＋ 新しいタグを追加（複数可）</label>

              <div id="new-tags-container">
                <input type="text" name="new_tags" class="form-control mb-2" placeholder="タグを入力">
              </div>

              <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addTagField()">
                ＋ タグ追加
              </button>

              <div class="form-text">
                ※複数の新規タグを追加できます
              </div>
            </div>

            <div class="mb-3">
                <label class="form-label">メモ</label>
                <input type="text" name="memo" class="form-control" placeholder="理由など">
            </div>

            <button type="submit" class="btn btn-success w-100">
                登録
            </button>

        </form>
    </div>

</div>

</body>
<script>
function addTagField() {
    const container = document.getElementById("new-tags-container");

    const input = document.createElement("input");
    input.type = "text";
    input.name = "new_tags";  // ←これ重要（同じ名前）
    input.className = "form-control mb-2";
    input.placeholder = "タグを入力";

    container.appendChild(input);
}
</script>
</html>
