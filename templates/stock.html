<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stock Chart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body class="bg-light">

<div class="container mt-4">

    {% if message %}
        <div class="alert alert-info">{{ message }}</div>
    {% endif %}

    {% if img_path %}
        <div class="text-center mb-4">
            <img src="/{{ img_path }}" alt="stock chart" class="img-fluid rounded shadow">
        </div>
    {% endif %}

    <!-- お気に入り -->
    <button id="fav-btn" class="btn btn-warning mb-3">お気に入りに追加</button>

    <div id="fav-result"></div>

    <form action="/stock" method="post" class="card p-3 mt-4">

        <div class="mb-3">
            <label for="code" class="form-label">銘柄コード</label>
            <input
                type="text"
                id="code"
                name="code"
                class="form-control"
                value="{{ code if code else '' }}"
                placeholder="例: 7203 または 7203.T"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">短期MA</label>
            <input
                type="number"
                name="ma_short"
                class="form-control"
                value="{{ ma_short if ma_short else 5 }}"
                min="1"
            >
        </div>

        <div class="mb-3">
            <label class="form-label">長期MA</label>
            <input
                type="number"
                name="ma_long"
                class="form-control"
                value="{{ ma_long if ma_long else 25 }}"
                min="1"
            >
        </div>

        <button type="submit" class="btn btn-primary">
            チャート表示
        </button>

    </form>

    <a href="/" class="btn btn-secondary mt-3">戻る</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% raw %}
<script>
document.getElementById("fav-btn").addEventListener("click", async () => {

    const code = document.getElementById("code").value;

    // ✅ CSRF取得（cookie）
    const csrf = document.cookie
        .split("; ")
        .find(row => row.startsWith("csrf_token="))
        ?.split("=")[1];

    const res = await fetch("/favorite", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `code=${encodeURIComponent(code)}&csrf_token=${encodeURIComponent(csrf)}`
    });

    const data = await res.json();

    const result = document.getElementById("fav-result");

    if (data.status === "ok") {
        result.innerHTML = `<div class="alert alert-success mt-3">追加成功</div>`;
    } else {
        result.innerHTML = `<div class="alert alert-danger mt-3">失敗</div>`;
    }
});
</script>
{% endraw %}

</body>
</html>
