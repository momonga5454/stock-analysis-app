<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stock Chart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body class="bg-light">

<div class="container mt-4">

    {% if message %}
        <div class="alert alert-info">{{ message }}</div>
    {% endif %}

    {% if img_path %}
        <div class="text-center mb-4">
            <img src="/{{ img_path }}" alt="stock chart" class="img-fluid rounded shadow">
        </div>
    {% endif %}

    <!-- Ajax でお気に入り追加 -->
    <button id="fav-btn" class="btn btn-warning mb-3">お気に入りに追加</button>

    <div id="fav-result"></div>

    <a href="/" class="btn btn-secondary">戻る</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("fav-btn").addEventListener("click", async () => {
    const code = "{{ code }}";
    const csrf = "{{ request.cookies.get('csrf_token') }}";  // ← 追加

    const res = await fetch("/favorite", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `code=${encodeURIComponent(code)}&csrf_token=${encodeURIComponent(csrf)}`  // ← 追加
    });

    const data = await res.json();


    // メッセージ表示
    const result = document.getElementById("fav-result");
    if (data.status === "ok") {
        result.innerHTML = `<div class="alert alert-success mt-3">お気に入りに追加しました！</div>`;
    } else {
        result.innerHTML = `<div class="alert alert-danger mt-3">追加に失敗しました。</div>`;
    }
});
</script>

</body>
</html>
