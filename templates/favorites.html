<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>お気に入り一覧</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body class="bg-light">

<!-- ========================= -->
<!--      ナビバー     -->
<!-- ========================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">株価分析アプリ</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="/tag-analysis">タグ自己分析</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/trade">トレード登録</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="/trades">トレード一覧</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/favorites">お気に入り</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/logout">ログアウト</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">お気に入り銘柄</h1>

    {% if favorites %}
        <ul class="list-group mb-4">
        {% for code, name in favorites %}
            <li class="list-group-item d-flex justify-content-between align-items-center">

                <!-- 銘柄リンク -->
                <div>
                    <a href="/stock?code={{ code }}" class="text-decoration-none fw-bold">
                        {{ name if name else code }}
                    </a>
                    <div class="text-muted small">{{ code }}</div>
                </div>

                <!-- 削除ボタン -->
                <form action="/delete_favorite" method="post" class="m-0">
                    <input type="hidden" name="code" value="{{ code }}">
                    <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token') }}">
                    <button type="submit" class="btn btn-danger btn-sm">
                        削除
                    </button>
                </form>

            </li>
        {% endfor %}
        </ul>

    {% else %}
        <!-- ✅ 空のとき -->
        <div class="alert alert-secondary">
            お気に入りはまだ登録されていません
        </div>
    {% endif %}

    <div class="d-flex gap-2">
        <a href="/" class="btn btn-secondary">ホーム</a>
        <a href="/stock" class="btn btn-primary">銘柄検索</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
