<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>お気に入り一覧</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body class="bg-light">

<div class="container mt-4">

    <h1 class="mb-4">お気に入り銘柄</h1>

    <ul class="list-group mb-4">
    {% for code, name in favorites %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="/stock?code={{ code }}" class="text-decoration-none">
                {{ code }} - {{ name }}
            </a>

            <form action="/delete_favorite" method="post" class="m-0">
                <input type="hidden" name="code" value="{{ code }}">
                <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token') }}">
                <button type="submit" class="btn btn-danger btn-sm">削除</button>
            </form>
        </li>
    {% endfor %}
    </ul>

    <a href="/" class="btn btn-secondary">戻る</a>

</div>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
